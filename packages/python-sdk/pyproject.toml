[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chromiumfish"
dynamic = ["version"]
description = "Stealth Chromium build with a drop-in Playwright harness — fetches and launches the ChromiumFish browser."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
license-files = ["LICENSE"]
authors = [{ name = "Arman Hossain" }]
keywords = ["playwright", "chromium", "stealth", "fingerprint", "automation", "anti-detect"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Internet :: WWW/HTTP :: Browsers",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "playwright>=1.40",
]

[project.urls]
Homepage = "https://chromiumfish.com"
Repository = "https://github.com/arman-bd/chromiumfish"
Documentation = "https://chromiumfish.com"
Releases = "https://github.com/arman-bd/chromiumfish/releases"

[project.scripts]
chromiumfish = "chromiumfish.cli:main"

[tool.hatch.version]
path = "src/chromiumfish/version.py"

# This package lives in a subdirectory of the monorepo. The repo-root .gitignore
# anchors a `/src/` rule (to ignore the vendored Chromium tree at the root), and
# hatchling's VCS-aware file selector would otherwise apply it here and silently
# drop src/chromiumfish — producing a metadata-only wheel. Disable VCS-based
# exclusion; the explicit packages/include below fully define what ships.
[tool.hatch.build]
ignore-vcs = true

[tool.hatch.build.targets.wheel]
packages = ["src/chromiumfish"]

[tool.hatch.build.targets.sdist]
include = ["src/chromiumfish", "README.md", "LICENSE"]
