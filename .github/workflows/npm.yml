name: Publish JS SDK to npm

on:
  push:
    tags:
      - "js-v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/js-sdk

jobs:
  build:
    name: Build and check package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inspect publishable package
        run: npm pack --dry-run

      - name: Verify the packed tarball ships dist (guards against an empty package)
        run: |
          tarball="$(npm pack --silent)"
          for f in package/dist/index.js package/dist/launcher.js package/dist/ip2tz.js; do
            tar -tzf "$tarball" | grep -qx "$f" || { echo "::error::$f missing from npm package"; exit 1; }
          done
          echo "npm package contains dist/ ✓"

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/chromiumfish
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
